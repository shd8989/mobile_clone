<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Mobile Clone - 수업예약</title>
  
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  
  <link rel="stylesheet" href="./styles.css">
</head>
<body>

  <div class="header">
    <h1>수업예약</h1>
    <span class="material-symbols-outlined icon">notifications</span>
  </div>

  <div class="ticket-container">
    <div class="ticket-box">
      <span class="ticket-name">6:1 그룹 100회권</span>
      <span class="ticket-change">변경</span>
    </div>
  </div>

  <div class="calendar-header">
    <div class="month-control">
      <span class="material-symbols-outlined">arrow_back_ios</span>
      <h2>2026년 07월</h2>
      <span class="material-symbols-outlined">arrow_forward_ios</span>
    </div>
    <div class="view-toggles">
      <div class="toggle-btn">
        <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">calendar_month</span>
        주간
      </div>
      <div class="toggle-btn">
        <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0; color: #1e58d2;">today</span>
        <span style="color: #1e58d2;">오늘</span>
      </div>
    </div>
  </div>

  <div class="calendar-grid">
    <div class="weekdays">
      <div class="sun">일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div class="sat">토</div>
    </div>
    <div class="days">
      <div class="day empty"><div class="day-circle"></div></div>
      <div class="day empty"><div class="day-circle"></div></div>
      <div class="day empty"><div class="day-circle"></div></div>
      <div class="day"><div class="day-circle" style="background:transparent;">1</div></div>
      <div class="day"><div class="day-circle" style="background:transparent;">2</div></div>
      <div class="day"><div class="day-circle" style="background:transparent;">3</div></div>
      <div class="day sat"><div class="day-circle">4</div></div>
      <div class="day selected"><div class="day-circle">5</div></div>
      <div class="day"><div class="day-circle">6</div></div>
      <div class="day"><div class="day-circle">7</div></div>
      <div class="day"><div class="day-circle">8</div></div>
      <div class="day"><div class="day-circle">9</div></div>
      <div class="day"><div class="day-circle">10</div></div>
      <div class="day"><div class="day-circle">11</div></div>
      <div class="day"><div class="day-circle">12</div></div>
      <div class="day"><div class="day-circle">13</div></div>
      <div class="day"><div class="day-circle">14</div></div>
      <div class="day"><div class="day-circle">15</div></div>
      <div class="day"><div class="day-circle">16</div></div>
      <div class="day"><div class="day-circle">17</div></div>
      <div class="day"><div class="day-circle">18</div></div>
      <div class="day"><div class="day-circle">19</div></div>
      <div class="day"><div class="day-circle">20</div></div>
      <div class="day"><div class="day-circle">21</div></div>
      <div class="day"><div class="day-circle">22</div></div>
      <div class="day"><div class="day-circle">23</div></div>
      <div class="day"><div class="day-circle">24</div></div>
      <div class="day"><div class="day-circle">25</div></div>
      <div class="day"><div class="day-circle">26</div></div>
      <div class="day"><div class="day-circle">27</div></div>
      <div class="day"><div class="day-circle">28</div></div>
      <div class="day"><div class="day-circle">29</div></div>
      <div class="day"><div class="day-circle">30</div></div>
      <div class="day"><div class="day-circle">31</div></div>
    </div>
  </div>

  <div class="schedule-list" id="scheduleList">
    </div>

  <div class="bottom-nav">
    <div class="nav-item">
      <span class="material-symbols-outlined">local_activity</span>
      <span>수강권</span>
    </div>
    <div class="nav-item active">
      <span class="material-symbols-outlined">calendar_today</span>
      <span>수업예약</span>
    </div>
    <div class="nav-item">
      <span class="material-symbols-outlined">history</span>
      <span>이용내역</span>
    </div>
    <div class="nav-item">
      <span class="material-symbols-outlined">person</span>
      <span>마이페이지</span>
    </div>
    <div class="nav-item">
      <span class="material-symbols-outlined">chair</span>
      <span>라운지</span>
    </div>
  </div>

  <script>
    const scheduleList = document.getElementById('scheduleList');
    let htmlContent = '';

    // 08시부터 22시까지 반복하면서 카드 HTML 생성
    for (let i = 8; i <= 22; i++) {
      // 시간을 두 자리 숫자로 맞춤 (예: 8 -> 08)
      const startHour = i.toString().padStart(2, '0');
      
      htmlContent += `
        <div class="schedule-card">
          <div class="card-header">
            <div class="time-wrap">
              <span class="time-marker"></span>
              <span class="time-text">${startHour}:00 ~ ${startHour}:50</span>
            </div>
            <button class="action-btn">예약취소</button>
          </div>
          
          <div class="card-body">
            <span class="material-symbols-outlined avatar" style="font-variation-settings: 'FILL' 1;">account_circle</span>
            <div class="info">
              <div class="class-name">리포머</div>
              <div class="class-desc">노보람 강사 | 리포머 룸</div>
            </div>
          </div>
          
          <div class="card-footer">
            <span class="material-symbols-outlined">person</span>
            <span>예약 7 / 7명</span>
          </div>
        </div>
      `;
    }

    // 생성된 HTML을 스케줄 리스트 영역에 삽입
    scheduleList.innerHTML = htmlContent;
  </script>
</body>
</html>
