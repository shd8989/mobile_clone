<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Mobile Clone - 예약 완료</title>

  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Malgun Gothic", "맑은 고딕", sans-serif;
      background: #e9ecf1;
      color: #1a1a1a;
    }

    .phone {
      max-width: 430px;
      margin: 0 auto;
      background: #fff;
      min-height: 100vh;
      position: relative;
      padding: 16px 16px 96px;
    }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      vertical-align: middle;
    }

    /* 상단 '닫기' 텍스트 */
    .top-close {
      text-align: center;
      font-size: 15px; font-weight: 600;
      padding: 6px 0 16px;
      cursor: pointer;
    }

    /* 광고 배너 */
    .ad-banner {
      background: #2b3252;
      border-radius: 14px;
      padding: 20px 20px;
      color: #fff;
      position: relative;
      overflow: hidden;
      margin-bottom: 34px;
    }
    .ad-banner .ad-brand {
      position: absolute; top: 16px; right: 18px;
      font-size: 12px; font-weight: 700; color: #cdd3e6;
    }
    .ad-banner .ad-brand b { color: #fff; font-size: 15px; }
    .ad-banner .ad-title { font-size: 19px; font-weight: 800; margin-bottom: 8px; }
    .ad-banner .ad-sub { font-size: 14px; color: #c9cee0; }
    .ad-banner .ad-emoji {
      position: absolute; right: 16px; bottom: 8px; font-size: 40px;
    }

    /* 완료 헤드 */
    .done-check {
      width: 40px; height: 40px; border-radius: 50%;
      background: #2f6bff;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 18px;
    }
    .done-check .material-symbols-outlined {
      color: #fff; font-size: 26px; font-variation-settings: 'FILL' 1, 'wght' 700;
    }
    .done-title {
      font-size: 27px; font-weight: 800; line-height: 1.35;
      margin-bottom: 26px;
    }

    /* 예약 요약 카드 */
    .summary-card {
      background: #f5f6f8;
      border-radius: 14px;
      padding: 20px 18px;
    }
    .summary-top {
      display: flex; align-items: flex-start; justify-content: space-between;
      padding-bottom: 18px;
    }
    .summary-top .class-name { font-size: 19px; font-weight: 800; margin-bottom: 10px; }
    .summary-top .class-meta {
      display: flex; align-items: center; gap: 8px;
      font-size: 15px; color: #3f444b;
    }
    .summary-top .class-meta .divider { color: #cfd4da; margin: 0 4px; }
    .summary-top .class-meta .mini-avatar {
      width: 26px; height: 26px; border-radius: 50%;
      background: #d9dde3;
      display: inline-flex; align-items: center; justify-content: center;
    }
    .summary-top .class-meta .mini-avatar .material-symbols-outlined {
      font-size: 18px; color: #fff; font-variation-settings: 'FILL' 1;
    }
    .summary-top .state-badge {
      border: 1px solid #b9c7ec; color: #4d74d6;
      border-radius: 8px; padding: 8px 16px;
      font-size: 14px; font-weight: 700; flex-shrink: 0;
    }

    .summary-divider { border-top: 1px solid #e4e6ea; }

    .summary-info { padding-top: 16px; }
    .info-row {
      display: flex; justify-content: space-between;
      font-size: 14px; margin-bottom: 8px;
    }
    .info-row .label { color: #8a9099; }
    .info-row .value { color: #1a1a1a; font-weight: 600; }

    /* 하단 '닫기' 버튼 */
    .bottom-close {
      position: fixed; left: 50%; transform: translateX(-50%); bottom: 16px;
      width: calc(100% - 32px); max-width: 398px;
      background: #fff;
      border: 1px solid #dfe2e7;
      border-radius: 12px;
      text-align: center;
      font-size: 16px; font-weight: 700;
      padding: 16px 0;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="phone">

    <div class="top-close" id="topClose">닫기</div>

    <!-- 광고 배너 -->
    <div class="ad-banner">
      <div class="ad-brand">병원갈 땐 <b>굿닥</b></div>
      <div class="ad-title">여성 질환, 참지 말고!</div>
      <div class="ad-sub">비대면진료로 5분 만에 해결</div>
      <div class="ad-emoji">📱❤️</div>
    </div>

    <!-- 완료 헤드 -->
    <div class="done-check">
      <span class="material-symbols-outlined">check</span>
    </div>
    <div class="done-title">수업 예약이<br>완료되었습니다</div>

    <!-- 예약 요약 카드 -->
    <div class="summary-card">
      <div class="summary-top">
        <div>
          <div class="class-name">리포머</div>
          <div class="class-meta">
            <span id="doneTime">2026. 7. 7 (화) 21:00</span>
            <span class="divider">|</span>
            <span class="mini-avatar"><span class="material-symbols-outlined">person</span></span>
            <span><span id="doneInstructor">노보람</span> 강사</span>
          </div>
        </div>
        <div class="state-badge">예약</div>
      </div>

      <div class="summary-divider"></div>

      <div class="summary-info">
        <div class="info-row">
          <span class="label">사용된 수강권</span>
          <span class="value">6:1 그룹 100회권</span>
        </div>
        <div class="info-row">
          <span class="label">예약일시</span>
          <span class="value" id="reservedAt">2026. 7. 5 (일) 14:03</span>
        </div>
      </div>
    </div>

    <!-- 하단 닫기 버튼 -->
    <button class="bottom-close" id="bottomClose">닫기</button>

  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const time = params.get('time');            // 예: "21:00 ~ 21:50"
    const instructor = params.get('instructor'); // 예: "노보람"

    if (instructor) {
      document.getElementById('doneInstructor').textContent = instructor;
    }
    if (time) {
      // "21:00 ~ 21:50" → 시작 시각만 사용
      const startTime = time.split('~')[0].trim();
      document.getElementById('doneTime').textContent = `2026. 7. 7 (화) ${startTime}`;
    }

    // 예약일시 = 현재 시각으로 표시
    (function () {
      const now = new Date();
      const days = ['일', '월', '화', '수', '목', '금', '토'];
      const y = now.getFullYear();
      const m = now.getMonth() + 1;
      const d = now.getDate();
      const w = days[now.getDay()];
      const hh = now.getHours().toString().padStart(2, '0');
      const mm = now.getMinutes().toString().padStart(2, '0');
      document.getElementById('reservedAt').textContent =
        `${y}. ${m}. ${d} (${w}) ${hh}:${mm}`;
    })();

    // 닫기 → 첫 화면(index.html)으로 이동
    function goHome() { window.location.href = 'index.html'; }
    document.getElementById('topClose').addEventListener('click', goHome);
    document.getElementById('bottomClose').addEventListener('click', goHome);
  </script>
</body>
</html>
